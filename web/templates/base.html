<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Bloggy{{end}}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        nav { display: flex; gap: 16px; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid #ddd; }
        nav a { text-decoration: none; color: #333; }
        nav a:hover { text-decoration: underline; }
        h1 { margin-bottom: 24px; }
        h2 { margin-bottom: 16px; }
        .article { border: 1px solid #ddd; padding: 16px; margin-bottom: 16px; }
        .article h2 { margin-bottom: 8px; }
        .article h2 a { text-decoration: none; color: #333; }
        .article h2 a:hover { text-decoration: underline; }
        .meta { font-size: 12px; color: #888; margin-bottom: 8px; }
        .content { margin: 16px 0; line-height: 1.6; }
        .comment { border-left: 3px solid #ddd; padding-left: 12px; margin-bottom: 12px; }
        form { display: flex; flex-direction: column; gap: 12px; max-width: 400px; }
        input, textarea { padding: 8px; border: 1px solid #ddd; font-family: monospace; font-size: 14px; }
        textarea { min-height: 120px; resize: vertical; }
        button { padding: 8px 16px; background: #333; color: white; border: none; cursor: pointer; font-family: monospace; }
        button:hover { background: #555; }
        .error { color: red; font-size: 14px; }
        .success { color: green; font-size: 14px; }
        .actions { display: flex; gap: 8px; margin-top: 8px; }
        .btn-delete { background: #cc0000; padding: 2px 8px; font-size: 11px; width: auto; }
        .btn-small { width: auto; align-self: flex-start; }
        .btn-delete:hover { background: #ff0000; }
    </style>
</head>
<body>
    <nav>
        <a href="/"><strong>Bloggy</strong></a>
        <a href="/articles/new">New Article</a>
        {{if .LoggedIn}}
            <a href="/logout">Logout</a>
        {{else}}
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        {{end}}
    </nav>
    {{block "content" .}}{{end}}
</body>
</html>
